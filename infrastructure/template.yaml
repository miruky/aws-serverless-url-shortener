AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Serverless URL Shortener — Core infrastructure stack.
  Deploys API Gateway, Lambda functions, DynamoDB table, and IAM roles.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - stg
      - prod
    Description: Deployment environment name.
  ProjectName:
    Type: String
    Default: url-shortener
    Description: Prefix used for resource naming.
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package.
  LambdaS3Key:
    Type: String
    Default: lambda-package.zip
    Description: S3 key for the Lambda deployment package.

Resources:
  # ---------------------------------------------------------------------------
  # DynamoDB
  # ---------------------------------------------------------------------------
  UrlsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "${ProjectName}-urls-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: short_id
          AttributeType: S
      KeySchema:
        - AttributeName: short_id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # IAM — Lambda execution role
  # ---------------------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource: !GetAtt UrlsTable.Arn

  # ---------------------------------------------------------------------------
  # Lambda Functions
  # ---------------------------------------------------------------------------
  CreateUrlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-create-url-${Environment}"
      Runtime: python3.12
      Handler: src.handlers.create_url.handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          URLS_TABLE_NAME: !Ref UrlsTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  RedirectUrlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-redirect-url-${Environment}"
      Runtime: python3.12
      Handler: src.handlers.redirect_url.handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          URLS_TABLE_NAME: !Ref UrlsTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  GetUrlStatsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-get-url-stats-${Environment}"
      Runtime: python3.12
      Handler: src.handlers.get_url_stats.handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          URLS_TABLE_NAME: !Ref UrlsTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  DeleteUrlFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-delete-url-${Environment}"
      Runtime: python3.12
      Handler: src.handlers.delete_url.handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          URLS_TABLE_NAME: !Ref UrlsTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  ListUrlsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-list-urls-${Environment}"
      Runtime: python3.12
      Handler: src.handlers.list_urls.handler
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          URLS_TABLE_NAME: !Ref UrlsTable
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # ---------------------------------------------------------------------------
  # API Gateway — REST API
  # ---------------------------------------------------------------------------
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api-${Environment}"
      Description: URL Shortener REST API
      EndpointConfiguration:
        Types:
          - REGIONAL

  # /urls
  UrlsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: urls

  # /urls/{short_id}
  UrlsShortIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref UrlsResource
      PathPart: "{short_id}"

  # /{short_id}  (redirect)
  RedirectResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: "{short_id}"

  # POST /urls
  PostUrlsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref UrlsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateUrlFunction.Arn}/invocations

  # GET /urls
  GetUrlsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref UrlsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListUrlsFunction.Arn}/invocations

  # GET /urls/{short_id}
  GetUrlStatsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref UrlsShortIdResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetUrlStatsFunction.Arn}/invocations

  # DELETE /urls/{short_id}
  DeleteUrlMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref UrlsShortIdResource
      HttpMethod: DELETE
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DeleteUrlFunction.Arn}/invocations

  # GET /{short_id}  (redirect)
  RedirectMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref RedirectResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub >-
          arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${RedirectUrlFunction.Arn}/invocations

  # API Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - PostUrlsMethod
      - GetUrlsMethod
      - GetUrlStatsMethod
      - DeleteUrlMethod
      - RedirectMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100

  # ---------------------------------------------------------------------------
  # Lambda Permissions — allow API Gateway to invoke functions
  # ---------------------------------------------------------------------------
  CreateUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateUrlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/POST/urls"

  ListUrlsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListUrlsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/GET/urls"

  GetUrlStatsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetUrlStatsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/GET/urls/*"

  DeleteUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DeleteUrlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/DELETE/urls/*"

  RedirectUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RedirectUrlFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/GET/*"

Outputs:
  ApiEndpoint:
    Description: Base URL of the deployed API
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  UrlsTableName:
    Description: DynamoDB table name
    Value: !Ref UrlsTable
  UrlsTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt UrlsTable.Arn
